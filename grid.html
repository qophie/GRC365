<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Works | Emma Darnell</title>
</head>

<link rel="stylesheet" href="https://use.typekit.net/gjm6drx.css">

<style>

h1 {
margin-bottom: 60px;
color: #d96c9d;
font-family: "dreaming-outloud-script", cursive;
font-size: 65px;
letter-spacing: 0px;
text-align: center;
}

.gallery-wrapper {
background: #ffffff;
max-width: 1000px;
margin: 0 auto;
padding: 60px;
border-radius: 24px;
box-shadow: 0 10px 35px rgba(217,108,157,0.15);
}

.gallery {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 40px;
align-items: start;
}

.gallery img {
width: 100%;
height: auto;
border-radius: 16px;
box-shadow: 0 6px 18px rgba(217,108,157,0.12);
transition: 0.3s ease;
}

.gallery img:hover {
transform: scale(1.02);
box-shadow: 0 12px 25px rgba(217,108,157,0.25);
}

.featured {
grid-column: span 2;
}

/* Responsive */
@media (max-width: 768px) {
.gallery {
grid-template-columns: 1fr;
}

.featured {
grid-column: span 1;
}

.gallery-wrapper {
padding: 30px;
}
}

</style>

<body>

<h1>Selected Works</h1>

<div class="gallery-wrapper">

<div class="gallery">

<img src="moment billboard.jpg" class="featured" alt="Featured Project">
<img src="kiyo.jpg" alt="Project 2">
<img src="moment poster.jpg" alt="Project 3">
<img src="rescene.png" alt="Project 4">
<img src="fots.jpg" alt="Project 5">

</div>
	
</body>
</html>
